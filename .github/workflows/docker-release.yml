name: Release Docker Image as ZIP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag to package (e.g., v0.10.8)'
        required: true
        type: string
  push:
    tags:
      - '*'
      - '!*-alpha*'
      - '!nightly*'

jobs:
  package_docker_zip:
    name: Package Docker Image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            filename_suffix: linux-amd64
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            filename_suffix: linux-arm64
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Docker image for tag: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: xinghai-api:${{ env.VERSION }}-${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Export Docker Image to Tar
        run: |
          docker save xinghai-api:${{ env.VERSION }}-${{ matrix.arch }} -o xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.tar

      - name: Compress to ZIP
        run: |
          zip -9 xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.tar
          rm xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.tar
          ls -lh xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip

      - name: Generate SHA256 Checksum
        run: |
          sha256sum xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip > xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip.sha256
          cat xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip
            xinghai-api-${{ env.VERSION }}-${{ matrix.filename_suffix }}.zip.sha256
          tag_name: ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
